<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CSV → JSON Converter</title>
<style>
  body { font-family: Arial; padding:20px; background:#111; color:#eee; }
  .section { margin-bottom:30px; padding:15px; border:1px solid #444; border-radius:8px; }
  button { margin-left:10px; padding:5px 10px; cursor:pointer; }
  textarea {
    width:100%; height:150px; margin-top:10px;
    background:#222; color:#0f0; border:1px solid #555; display:none;
  }
</style>
</head>
<body>

<h1>Conversor CSV → JS</h1>

<div class="section">
  <h2>Idols</h2>
  <input type="file" id="idolsFile">
  <button onclick="processarArquivo('idols')">Converter</button>
  <button onclick="copiarJS('idols')">Copiar JS</button>
  <textarea id="idolsOutput"></textarea>
</div>

<div class="section">
  <h2>Musics</h2>
  <input type="file" id="songsFile">
  <button onclick="processarArquivo('songs')">Converter</button>
  <button onclick="copiarJS('songs')">Copiar JS</button>
  <textarea id="songsOutput"></textarea>
</div>

<div class="section">
  <h2>Producers</h2>
  <input type="file" id="producersFile">
  <button onclick="processarArquivo('producers')">Converter</button>
  <button onclick="copiarJS('producers')">Copiar JS</button>
  <textarea id="producersOutput"></textarea>
</div>

<script>

//f:parseCSVLine (suporta aspas corretamente)
function parseCSVLine(line) {
  const result = [];
  let current = "";
  let insideQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"') {
      insideQuotes = !insideQuotes;
      continue;
    }

    if (char === ',' && !insideQuotes) {
      result.push(current.trim());
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current.trim());
  return result;
}

//f:normalizarChave
function normalizarChave(chave) {
  return chave
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "");
}

//f:parseArray (usa "/" como separador interno)
function parseArray(valor) {
  if (!valor) return [];
  return valor
    .split("/")
    .map(v => v.trim())
    .filter(Boolean);
}

//f:processarArquivo
function processarArquivo(tipo) {
  const input = document.getElementById(tipo + "File");
  const output = document.getElementById(tipo + "Output");

  const file = input.files[0];
  if (!file) return alert("Selecione um arquivo!");

  const reader = new FileReader();

  reader.onload = function(e) {
    const linhas = e.target.result.trim().split("\n");

    const headers = parseCSVLine(linhas[0])
      .map(h => normalizarChave(h));

    let resultado = [];

    for (let i = 1; i < linhas.length; i++) {
      if (!linhas[i].trim()) continue;

      const valores = parseCSVLine(linhas[i]);
      let obj = {};

      headers.forEach((h, index) => {
        obj[h] = valores[index] || "";
      });

      // IDOLS
      if (tipo === "idols") {
        obj = {
          gen: obj.geracao,
          type: obj.tipo,
          id: obj.id,
          name: obj.nome,
          group: obj.grupo,
          aniversario: obj.aniversario,
          vocal: obj.vocal,
          dance: obj.dance,
          rap: obj.rap,
          center: obj.center,
          visual: obj.visual,
          especialidade: obj.especialidade,

          conceitos: parseArray(obj.conceitospredominantes),
          generos: parseArray(obj.generospredominantes),

          fortes: obj.pontosfortes,
          fracos: obj.pontosfracos
        };
      }

      // SONGS
      if (tipo === "songs") {
        obj = {
          type: obj.tipo,
          id: obj.id,
          name: obj.nome,
          fonte: obj.fonte,

          conceitos: parseArray(obj.conceitosoriginais),
          generos: parseArray(obj.generosoriginais)
        };
      }

      // PRODUCERS
      if (tipo === "producers") {
        obj = {
          type: obj.tipo,
          id: obj.id,
          name: obj.nome,

          conceitos: parseArray(obj.conceitospredominantes),
          generos: parseArray(obj.generospredominantes),
          musicas: parseArray(obj.musicasconhecidas)
        };
      }

      resultado.push(obj);
    }

    output.value = JSON.stringify(resultado, null, 2);
    output.style.display = "block";
  };

  reader.readAsText(file);
}

//f:copiarJS
function copiarJS(tipo) {
  const output = document.getElementById(tipo + "Output");
  if (!output.value) return alert("Converta primeiro!");

  const nomes = {
    idols: "idols",
    songs: "musics",
    producers: "producers"
  };

  const texto = `const ${nomes[tipo]} = ${output.value};`;

  navigator.clipboard.writeText(texto)
    .then(() => alert("Copiado!"))
    .catch(() => alert("Erro ao copiar"));
}

</script>
</body>
</html>
